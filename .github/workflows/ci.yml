name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  mix_test:
    name: mix test (Elixir ${{matrix.elixir}} | Erlang/OTP ${{matrix.otp}})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        # Matrix follows the elixir compatibility table:
        # https://hexdocs.pm/elixir/compatibility-and-deprecations.html
        # We test on OTP 27, 28, 29 (the latest three releases), falling back
        # to the latest OTP each Elixir version supports.
        include:
          # 1.16 supports OTP 24-26 — latest is 26.
          - elixir: 1.16.x
            otp: 26.x
            tests_may_fail: false
          # 1.17 supports OTP 25-27 — latest is 27.
          - elixir: 1.17.x
            otp: 27.x
            tests_may_fail: false
          # 1.18 supports OTP 25-27 — latest is 27.
          - elixir: 1.18.x
            otp: 27.x
            tests_may_fail: false
          # 1.19 supports OTP 26-28.
          - elixir: 1.19.x
            otp: 27.x
            tests_may_fail: false
          - elixir: 1.19.x
            otp: 28.x
            tests_may_fail: false
          # 1.20 supports OTP 27-29.
          - elixir: 1.20.x
            otp: 27.x
            tests_may_fail: false
          - elixir: 1.20.x
            otp: 28.x
            tests_may_fail: false
          - elixir: 1.20.x
            otp: 29.x
            tests_may_fail: false
    env:
      MIX_ENV: test
    steps:
      - uses: actions/checkout@v7
      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{matrix.otp}}
          elixir-version: ${{matrix.elixir}}
      - name: Install Dependencies
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get --only test
      - run: mix test
        continue-on-error: ${{ matrix.tests_may_fail }}

  mix_test_windows:
    name: mix test windows (Elixir ${{matrix.elixir}} | Erlang/OTP ${{matrix.otp}})
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        # Same matrix as mix_test (Linux). See above for compatibility notes.
        include:
          - elixir: 1.16.x
            otp: 26.x
            tests_may_fail: false
          - elixir: 1.17.x
            otp: 27.x
            tests_may_fail: false
          - elixir: 1.18.x
            otp: 27.x
            tests_may_fail: false
          - elixir: 1.19.x
            otp: 27.x
            tests_may_fail: false
          - elixir: 1.19.x
            otp: 28.x
            tests_may_fail: false
          - elixir: 1.20.x
            otp: 27.x
            tests_may_fail: false
          - elixir: 1.20.x
            otp: 28.x
            tests_may_fail: false
          - elixir: 1.20.x
            otp: 29.x
            tests_may_fail: false
    env:
      MIX_ENV: test
    steps:
      - name: Set git to use original line ending
        run: |
          git config --global core.autocrlf false
      - uses: actions/checkout@v7
      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{matrix.otp}}
          elixir-version: ${{matrix.elixir}}
      - name: Install Dependencies
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get --only test
      - run: mix test
        continue-on-error: ${{ matrix.tests_may_fail }}

  static_analysis:
    name: static analysis (Elixir ${{matrix.elixir}} | Erlang/OTP ${{matrix.otp}})
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include:
          - elixir: 1.20.x
            otp: 29.x
    steps:
      - uses: actions/checkout@v7
      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{matrix.otp}}
          elixir-version: ${{matrix.elixir}}
      - name: Cache build artifacts
        uses: actions/cache@v6
        with:
          # Cache deps and the dialyzer PLT (the slow part), but NOT this app's
          # own compiled output. Caching `_build/dev/lib/elixir_sense` would let
          # orphaned beams from since-deleted source (e.g. the old
          # `src/elixir_sense_parser.yrl`) linger and get re-analyzed by
          # dialyzer. The key is salted (`-v2-`) and hashes `mix.lock` so the
          # previously-poisoned cache is not restored and dep changes bust it.
          path: |
            ~/.hex
            ~/.mix
            _build
            !_build/*/lib/elixir_sense
          key: ${{ matrix.otp }}-${{ matrix.elixir }}-static_analysis-build-v2-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ matrix.otp }}-${{ matrix.elixir }}-static_analysis-build-v2-
      - name: Install Dependencies
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get
      - name: Restore timestamps to prevent unnecessary recompilation
        run: IFS=$'\n'; for f in $(git ls-files); do touch -d "$(git log -n 1 --pretty='%cI' -- $f)" "$f"; done
      # Blocking gate: the app's lib code must compile without warnings. Run in
      # the default (dev) env so test/support fixtures — which carry intentional
      # warnings (unused alias/require) — are not on elixirc_paths. `--force`
      # ensures warnings re-emit even when the build cache is warm.
      - run: mix compile --force --warnings-as-errors
      - run: mix format --check-formatted
      - run: mix credo --all --strict
      # Dialyzer is clean (known warnings tracked in .dialyzer_ignore.exs); keep
      # it a blocking gate so regressions are caught instead of silently hidden.
      - run: mix dialyzer
